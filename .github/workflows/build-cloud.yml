name: Build macOS App (Cloud Compiler)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Vision-Key on Stable Cloud Mac
    runs-on: macos-14

    steps:
    - name: Lấy mã nguồn
      uses: actions/checkout@v4

    - name: Biên dịch & Ký Ad-hoc (macOS chấp nhận)
      run: |
        cd GeminiSnap
        xcodebuild \
          -project GeminiSnap.xcodeproj \
          -scheme GeminiSnap \
          -configuration Release \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=YES \
          CODE_SIGNING_ALLOWED=YES \
          -derivedDataPath Build/

    - name: Xóa Quarantine & Xác nhận chữ ký
      run: |
        APP_PATH="GeminiSnap/Build/Build/Products/Release/GeminiSnap.app"
        # Ký ad-hoc toàn bộ app bundle
        codesign --force --deep --sign "-" "$APP_PATH"
        # Xóa quarantine flag
        xattr -cr "$APP_PATH"
        echo "✅ App signed and quarantine cleared"
        codesign -dv "$APP_PATH"

    - name: Nén file App thành ZIP
      run: |
        cd GeminiSnap/Build/Build/Products/Release/
        ditto -c -k --sequesterRsrc --keepParent GeminiSnap.app GeminiSnap-CloudBuild.zip

    - name: Trả thành phẩm cho người dùng
      uses: actions/upload-artifact@v4
      with:
        name: Vision-Key-App-Bypass
        path: GeminiSnap/Build/Build/Products/Release/GeminiSnap-CloudBuild.zip
