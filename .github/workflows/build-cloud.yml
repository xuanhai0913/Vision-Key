name: Build macOS App (Cloud Compiler)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Vision-Key on Stable Cloud Mac
    runs-on: macos-14
    permissions:
      contents: write

    steps:
    - name: Lấy mã nguồn
      uses: actions/checkout@v4

    - name: Chọn Xcode ổn định
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: "15.4"

    - name: Biên dịch Release (không ký ở bước build)
      run: |
        set -o pipefail
        cd GeminiSnap
        set +e
        xcodebuild \
          -project GeminiSnap.xcodeproj \
          -scheme GeminiSnap \
          -configuration Release \
          -destination 'platform=macOS' \
          CODE_SIGN_STYLE=Manual \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          ENABLE_PREVIEWS=NO \
          ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS=NO \
          MACOSX_DEPLOYMENT_TARGET=13.0 \
          -derivedDataPath Build/ \
          | tee xcodebuild.log
        BUILD_STATUS=${PIPESTATUS[0]}
        set -e

        # In lỗi quan trọng nếu build fail để dễ debug trên Actions
        if [ "$BUILD_STATUS" -ne 0 ]; then
          echo "=== xcodebuild errors ==="
          grep -nE "error:|\*\* BUILD FAILED \*\*|SwiftCompile|CompileSwift" xcodebuild.log | head -n 200 || true
          exit "$BUILD_STATUS"
        fi

    - name: Ký với Designated Requirement ổn định (fix TCC permission)
      run: |
        APP_PATH="GeminiSnap/Build/Build/Products/Release/GeminiSnap.app"
        BUNDLE_ID="com.geminisnap.app"
        
        # Ký với designated requirement cố định dựa trên Bundle ID
        # Điều này đảm bảo macOS TCC nhận ra app qua các lần build khác nhau
        codesign --force --deep \
          --sign "-" \
          --identifier "$BUNDLE_ID" \
          --requirements "=designated => identifier \"$BUNDLE_ID\"" \
          "$APP_PATH"
        
        # Xóa quarantine flag
        xattr -cr "$APP_PATH"
        
        # Verify
        echo "=== Code Signing Info ===" 
        codesign -dv --verbose=4 "$APP_PATH" 2>&1 | grep -E "Identifier|designated|TeamID"
        echo "✅ Signed with stable designated requirement"

    - name: Nén bằng ditto (giữ metadata)
      run: |
        cd GeminiSnap/Build/Build/Products/Release/
        ditto -c -k --sequesterRsrc --keepParent GeminiSnap.app GeminiSnap.zip

    - name: Publish lên GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG="build-$(date +'%Y%m%d-%H%M%S')"
        gh release create "$TAG" \
          GeminiSnap/Build/Build/Products/Release/GeminiSnap.zip \
          --title "Vision-Key Build $(date +'%Y-%m-%d %H:%M')" \
          --notes "✅ Auto-built by GitHub Actions. Ad-hoc signed — mở được trên Mac không cần Apple Developer Account." \
          --latest
